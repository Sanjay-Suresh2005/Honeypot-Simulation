# ─────────────────────────────────────────────────────────────────────────────
#  Deception Lab — Logstash Pipeline Configuration
#  Path: logstash/pipeline/logstash.conf
# ─────────────────────────────────────────────────────────────────────────────

input {
  # Standard Beats input to support Filebeat natively
  beats {
    port => 5055
    tags => ["honeypot_data"]
  }

  # OPTIONAL TCP INPUT ALTERNATIVE
  # If you prefer to send raw JSON logs over TCP (e.g. via netcat),
  # uncomment the tcp input below and comment out the beats input above.
  #
  # tcp {
  #   port => 5055
  #   codec => json
  #   tags => ["honeypot_data"]
  # }
}

filter {
  # Only process events tagged as honeypot_data
  if "honeypot_data" in [tags] {

    # Normalize dataset field from Filebeat fields namespace to root ECS
    if [fields][event][dataset] {
      mutate {
        add_field => { "[event][dataset]" => "%{[fields][event][dataset]}" }
      }
    }

    # Parse Decoy Scan iptables logs to extract source/destination IPs
    if [event][dataset] == "decoy-scan" {
      grok {
        match => { "message" => "SRC=(?<[source][ip]>[0-9\.]+) DST=(?<[destination][ip]>[0-9\.]+) .* DPT=(?<[destination][port]>[0-9]+)" }
        tag_on_failure => ["_grokparsefailure_decoy"]
      }
      mutate {
        add_field => { "[mitre][tactic]" => "Reconnaissance" }
        add_field => { "[mitre][technique_id]" => "T1595" }
        add_field => { "[mitre][technique_name]" => "Active Scanning" }
      }
    }

    # 1. Normalize source IP from various honeypots to [source][ip]
    if [source.ip] {
      mutate {
        rename => { "source.ip" => "[source][ip]" }
      }
    } else if [src_ip] {
      mutate {
        add_field => { "[source][ip]" => "%{src_ip}" }
      }
    } else if [src_host] {
      mutate {
        add_field => { "[source][ip]" => "%{src_host}" }
      }
    } else if [src] {
      mutate {
        add_field => { "[source][ip]" => "%{src}" }
      }
    }

    # 2. Perform threat intelligence lookups and GeoIP resolution if [source][ip] is set and is not localhost
    if [source][ip] and [source][ip] != "127.0.0.1" and [source][ip] != "::1" {

      # Resolve attacker public IP to physical coordinates (GeoIP)
      geoip {
        source => "[source][ip]"
        target => "[source]"
      }

      # Deduplicate same source IP: allow only 1 event to get threat intelligence per 5 minutes
      throttle {
        before_count => -1
        after_count => 1
        period => 300
        key => "%{[source][ip]}"
        add_tag => "throttled"
      }

      # If the IP is NOT throttled, make the API lookups
      if "throttled" not in [tags] {

        # ─── ABUSEIPDB LOOKUP ───
        if "${ABUSEIPDB_API_KEY}" != "" and "${ABUSEIPDB_API_KEY}" != "your_abuseipdb_key_here" {
          http {
            url => "https://api.abuseipdb.com/api/v2/check?ipAddress=%{[source][ip]}&maxAgeInDays=90"
            verb => "GET"
            headers => {
              "Key" => "${ABUSEIPDB_API_KEY}"
              "Accept" => "application/json"
            }
            target_body => "[threat][abuseipdb]"
          }

          if [threat][abuseipdb][data][abuseConfidenceScore] {
            mutate {
              add_field => { "[threat][abuse_score]" => "%{[threat][abuseipdb][data][abuseConfidenceScore]}" }
            }
            mutate {
              convert => { "[threat][abuse_score]" => "integer" }
            }
          }
        }

        # ─── VIRUSTOTAL LOOKUP ───
        if "${VIRUSTOTAL_API_KEY}" != "" and "${VIRUSTOTAL_API_KEY}" != "your_virustotal_key_here" {
          http {
            url => "https://www.virustotal.com/api/v3/ip_addresses/%{[source][ip]}"
            verb => "GET"
            headers => {
              "x-apikey" => "${VIRUSTOTAL_API_KEY}"
            }
            target_body => "[threat][virustotal]"
          }

          if [threat][virustotal][data][attributes][last_analysis_stats][malicious] {
            mutate {
              add_field => { "[threat][vt_malicious]" => "%{[threat][virustotal][data][attributes][last_analysis_stats][malicious]}" }
            }
            mutate {
              convert => { "[threat][vt_malicious]" => "integer" }
            }
          }

          # Prune massive nested objects to prevent Elasticsearch mapping explosion (exceeding 1000 fields limit)
          mutate {
            remove_field => [
              "[threat][virustotal][data][attributes][last_analysis_results]",
              "[threat][virustotal][data][attributes][last_https_certificate]",
              "[threat][virustotal][data][attributes][whois]",
              "[threat][virustotal][data][attributes][historical_whois]"
            ]
          }
        }

        # ─── ALIENVAULT OTX LOOKUP ───
        if "${OTX_API_KEY}" != "" and "${OTX_API_KEY}" != "your_otx_key_here" {
          http {
            url => "https://otx.alienvault.com/api/v1/indicators/IPv4/%{[source][ip]}/general"
            verb => "GET"
            headers => {
              "X-OTX-API-KEY" => "${OTX_API_KEY}"
            }
            target_body => "[threat][otx]"
          }

          if [threat][otx][pulse_info][count] {
            mutate {
              add_field => { "[threat][otx_pulses]" => "%{[threat][otx][pulse_info][count]}" }
            }
            mutate {
              convert => { "[threat][otx_pulses]" => "integer" }
            }
          }
        }

      } else {
        # Optional: Add tag to indicate that TI lookup was skipped for this event due to rate-limiting
        mutate {
          add_tag => ["ti_lookup_throttled"]
        }
      }

    }

    # 3. Parse Auditd logs to extract audit key
    if [event][dataset] == "auditd" {
      grok {
        match => { "message" => "key=\"?(?<[audit][key]>[a-zA-Z0-9_-]+)\"?" }
        tag_on_failure => []
      }
    }

    # 4. MITRE ATT&CK Mapping Enrichment (Dynamic Translate lookup)
    if [event][dataset] == "auditd" and [audit][key] {
      translate {
        field => "[audit][key]"
        destination => "[mitre][raw]"
        dictionary_path => "/usr/share/logstash/mitre_map.yml"
        exact => true
      }
    } else if [event][dataset] == "cowrie" {
      # Normalize login events for Kibana detection rules & dashboards
      if [eventid] == "cowrie.login.failed" or [eventid] == "cowrie.login.success" {
        mutate {
          add_field => { "[event][action]" => "login" }
        }
        if [eventid] == "cowrie.login.failed" {
          mutate {
            add_field => { "[status]" => "fail" }
          }
        } else if [eventid] == "cowrie.login.success" {
          mutate {
            add_field => { "[status]" => "success" }
          }
        }
      }

      # Lookup MITRE ATT&CK mapping
      if [eventid] {
        translate {
          field => "[eventid]"
          destination => "[mitre][raw]"
          dictionary_path => "/usr/share/logstash/mitre_map.yml"
          exact => true
        }
      } else if [input] {
        # Fallback if eventid is missing but command input is present
        mutate {
          add_field => { "[mitre][raw]" => "Execution|T1059|Command and Scripting Interpreter" }
        }
      }
    } else if [event][dataset] == "opencanary" {
      # Map OpenCanary destination port to translation key
      mutate {
        add_field => { "[@metadata][port_key]" => "port_%{dst_port}" }
      }
      translate {
        field => "[@metadata][port_key]"
        destination => "[mitre][raw]"
        dictionary_path => "/usr/share/logstash/mitre_map.yml"
        fallback => "Reconnaissance|T1046|Network Service Scanning"
      }
    }

    # Split the pipeline-delimited raw translation into separate fields
    if [mitre][raw] {
      mutate {
        split => { "[mitre][raw]" => "|" }
      }
      mutate {
        add_field => {
          "[mitre][tactic]" => "%{[mitre][raw][0]}"
          "[mitre][technique_id]" => "%{[mitre][raw][1]}"
          "[mitre][technique_name]" => "%{[mitre][raw][2]}"
        }
        remove_field => [ "[mitre][raw]" ]
      }
    }

  }
}

output {
  if "honeypot_data" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "honeypot-events-%{+YYYY.MM.dd}"
    }
  }
}
