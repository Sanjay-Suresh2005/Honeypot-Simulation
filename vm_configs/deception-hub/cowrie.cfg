# Cowrie Custom Configuration
# Path: /etc/cowrie/cowrie.cfg (or equivalent virtualenv configuration)

[syslog]
enabled = false

[output_jsonlog]
enabled = true
logfile = /var/log/cowrie/cowrie.json

[ssh]
enabled = true
listen_port = 2222
listen_addr = 0.0.0.0

# Set hostname to make the honeypot feel like a real Ubuntu server
hostname = corp-web-prod
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5
